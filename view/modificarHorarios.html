<style>
  .horario-input {
    background: #f8f9fa !important;
    border: 2px solid #e1e4e8 !important;
    border-radius: 10px !important;
    font-family: "Fira Code", monospace;
    text-align: center;
    font-weight: 600;
  }
  .horario-input:focus {
    border-color: #0d6efd !important;
    box-shadow: none !important;
  }
  .promotor-select {
    border-radius: 12px !important;
    padding: 12px !important;
    border: 2px solid #0d6efd !important;
    font-weight: 600;
  }
</style>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10">
      <div class="card pro-card border-0">
        <div class="card-header pro-header text-white border-0">
          <div class="d-flex align-items-center">
            <div
              class="bg-success rounded-circle p-2 me-3"
              style="--bs-bg-opacity: 0.2"
            >
              <i class="bi bi-clock-history text-success fs-4"></i>
            </div>
            <div>
              <h5 class="mb-0 fw-bold">Gestión de Horarios</h5>
              <small class="text-white-50"
                >Configuración de jornadas por promotor</small
              >
            </div>
          </div>
        </div>

        <div class="card-body p-4">
          <div class="row mb-4">
            <div class="col-12">
              <label class="form-label fw-bold small text-muted text-uppercase"
                >Seleccionar Promotor</label
              >
              <select
                id="selectPromotor"
                class="form-select promotor-select"
                onchange="nsModificarHorarios.seleccionarDelCache(this.value)"
              >
                <option value="">Cargando lista de personal...</option>
              </select>
            </div>
          </div>

          <form
            id="formHorarios"
            onsubmit="nsModificarHorarios.grabarHorario(event)"
          >
            <input type="hidden" id="h_usuario_codigo" />

            <div class="row g-3">
              <div class="col-md-6">
                <div class="p-3 border rounded-3 bg-light">
                  <h6 class="fw-bold mb-3 text-primary">
                    <i class="bi bi-1-circle me-2"></i>Primer Turno
                  </h6>
                  <div class="row">
                    <div class="col-6">
                      <label class="small fw-bold">Entrada 1</label>
                      <input
                        type="time"
                        id="entrada1"
                        class="form-control horario-input"
                        required
                      />
                    </div>
                    <div class="col-6">
                      <label class="small fw-bold">Salida 1</label>
                      <input
                        type="time"
                        id="salida1"
                        class="form-control horario-input"
                        required
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-md-6">
                <div class="p-3 border rounded-3 bg-light">
                  <h6 class="fw-bold mb-3 text-primary">
                    <i class="bi bi-2-circle me-2"></i>Segundo Turno
                  </h6>
                  <div class="row">
                    <div class="col-6">
                      <label class="small fw-bold">Entrada 2</label>
                      <input
                        type="time"
                        id="entrada2"
                        class="form-control horario-input"
                      />
                    </div>
                    <div class="col-6">
                      <label class="small fw-bold">Salida 2</label>
                      <input
                        type="time"
                        id="salida2"
                        class="form-control horario-input"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="mt-4 d-grid">
              <button
                type="submit"
                class="btn btn-dark btn-pro"
                id="btnGrabarHorario"
                disabled
              >
                <i class="bi bi-cloud-arrow-up me-2"></i>ACTUALIZAR HORARIOS
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var nsModificarHorarios = (function () {
    let listaPromotoresCache = []; // Objeto global local

    async function init() {
      const select = document.getElementById("selectPromotor");
      try {
        // 1. Obtener specs de hardware y ID para seguridad
        const hardware = await obtenerUUIDHardwareGlobal();
        const deviceId = localStorage.getItem("device_token_id");

        // 2. Llamar a la Edge Function (Método POST por seguridad de Hardware)
        const response = await fetch(
          `${window.SUPABASE_URL}/functions/v1/asist_getPromotoresHorarios`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
              apikey: window.SUPABASE_ANON_KEY,
            },
            body: JSON.stringify({
              device_id: deviceId,
              hardware_specs: hardware.specs,
            }),
          },
        );

        const result = await response.json();
        if (result.status === "error") throw new Error(result.error);

        // 3. Guardar en Cache Local
        listaPromotoresCache = result.data;

        // 4. Llenar Select
        select.innerHTML =
          '<option value="">-- Seleccione un Promotor --</option>';
        listaPromotoresCache.forEach((p) => {
          const opt = document.createElement("option");
          opt.value = p.codigo;
          opt.textContent = `${p.nombre} (${p.codigo})`;
          select.appendChild(opt);
        });
      } catch (e) {
        console.error("Error init:", e);
        select.innerHTML = '<option value="">Error de acceso</option>';
        alertSMS("Acceso Denegado: " + e.message);
      }
    }

    // NUEVA FUNCIÓN: No consulta la BD, usa el objeto local
    function seleccionarDelCache(codigo) {
      const form = document.getElementById("formHorarios");
      const btn = document.getElementById("btnGrabarHorario");

      if (!codigo) {
        form.reset();
        btn.disabled = true;
        return;
      }

      const pro = listaPromotoresCache.find((item) => item.codigo === codigo);

      if (pro) {
        document.getElementById("h_usuario_codigo").value = pro.codigo;
        document.getElementById("entrada1").value = pro.entrada1 || "";
        document.getElementById("salida1").value = pro.salida1 || "";
        document.getElementById("entrada2").value = pro.entrada2 || "";
        document.getElementById("salida2").value = pro.salida2 || "";
        btn.disabled = false;

        if (!pro.entrada1) {
          console.log("Aviso: Promotor sin horario previo.");
        }
      }
    }

    async function grabarHorario(event) {
      event.preventDefault();
      const btn = document.getElementById("btnGrabarHorario");
      const codigo = document.getElementById("h_usuario_codigo").value;

      const payload = {
        usuario: codigo,
        entrada1: document.getElementById("entrada1").value,
        salida1: document.getElementById("salida1").value,
        entrada2: document.getElementById("entrada2").value,
        salida2: document.getElementById("salida2").value,
      };

      btn.disabled = true;
      btn.innerHTML =
        '<span class="spinner-border spinner-border-sm"></span> GUARDANDO...';

      try {
        const { error } = await window.supabase
          .from("asist_horarios")
          .upsert(payload, { onConflict: "usuario" });

        if (error) throw error;

        // ACTUALIZAR EL CACHE LOCAL para que no necesite refrescar la página
        const index = listaPromotoresCache.findIndex(
          (p) => p.codigo === codigo,
        );
        if (index !== -1) {
          listaPromotoresCache[index].entrada1 = payload.entrada1;
          listaPromotoresCache[index].salida1 = payload.salida1;
          listaPromotoresCache[index].entrada2 = payload.entrada2;
          listaPromotoresCache[index].salida2 = payload.salida2;
        }

        alertSMS("Horario actualizado en sistema y cache local ✅");
      } catch (e) {
        alertSMS("Error al guardar: " + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML =
          '<i class="bi bi-cloud-arrow-up me-2"></i>ACTUALIZAR HORARIOS';
      }
    }

    setTimeout(init, 100);

    return { seleccionarDelCache, grabarHorario };
  })();
</script>
