<style>
  @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Poppins:wght@300;400;600&display=swap");

  :root {
    --terminal-green: #00ff41;
    --dark-bg: #0d1117;
    --glass-bg: rgba(255, 255, 255, 0.05);
  }

  .pro-card {
    background: #ffffff;
    border-radius: 20px !important;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1) !important;
  }

  .pro-header {
    background: linear-gradient(135deg, #212529 0%, #000000 100%);
    padding: 1.5rem !important;
  }

  /* Sección de la Llave Estilo Terminal */
  .terminal-container {
    background: var(--dark-bg);
    border-radius: 12px;
    padding: 15px;
    position: relative;
    border: 1px solid #30363d;
  }

  .terminal-header {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .dot-r {
    background: #ff5f56;
  }
  .dot-y {
    background: #ffbd2e;
  }
  .dot-g {
    background: #27c93f;
  }

  .hash-box-style {
    background: transparent !important;
    color: var(--terminal-green) !important;
    font-family: "Fira Code", monospace !important;
    font-size: 0.85rem !important;
    border: none !important;
    outline: none !important;
    resize: none;
    box-shadow: none !important;
  }

  /* Etiquetas de Datos Técnicos */
  .tech-badge {
    background: #f0f2f5;
    color: #495057;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    display: inline-block;
    margin: 2px;
    border: 1px solid #e1e4e8;
  }

  .tech-label {
    color: #0d6efd;
    font-weight: 600;
    margin-right: 5px;
    text-transform: uppercase;
  }

  /* Animación de escaneo */
  .scanning-bar {
    height: 2px;
    background: var(--terminal-green);
    width: 0%;
    box-shadow: 0 0 10px var(--terminal-green);
    transition: width 0.5s ease;
  }

  .btn-pro {
    border-radius: 10px !important;
    font-weight: 600 !important;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    padding: 12px !important;
  }

  .btn-pro:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
  }
</style>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10 col-xl-8">
      <form
        id="formRegistroTerminal"
        onsubmit="nsRegistrarTerminal.procesarFormulario(event, this)"
      >
        <div class="card pro-card border-0">
          <div class="card-header pro-header text-white border-0">
            <div class="d-flex align-items-center">
              <div
                class="bg-primary rounded-circle p-2 me-3"
                style="--bs-bg-opacity: 0.2"
              >
                <i class="bi bi-cpu text-primary fs-4"></i>
              </div>
              <div>
                <h5 class="mb-0 fw-bold">Registro de Terminal</h5>
                <small class="text-white-50"
                  >Protocolo de Identificación de Hardware</small
                >
              </div>
            </div>
          </div>

          <div class="card-body p-4">
            <div class="row g-4">
              <div class="col-md-5">
                <h6 class="fw-bold mb-3 text-uppercase small text-muted">
                  Análisis de ADN Digital
                </h6>
                <div
                  id="debug-info"
                  class="p-3 bg-light rounded-3 border"
                  style="min-height: 200px"
                >
                  <div class="text-center text-muted py-4">
                    <div
                      class="spinner-border spinner-border-sm mb-2"
                      role="status"
                    ></div>
                    <br />Extrayendo specs...
                  </div>
                </div>
              </div>

              <div class="col-md-7">
                <div class="mb-4">
                  <label class="form-label fw-bold small"
                    >IDENTIFICADOR ÚNICO GENERADO</label
                  >
                  <div class="terminal-container">
                    <div class="terminal-header">
                      <div class="dot dot-r"></div>
                      <div class="dot dot-y"></div>
                      <div class="dot dot-g"></div>
                    </div>
                    <div class="scanning-bar mb-2" id="scan-bar"></div>
                    <textarea
                      class="form-control hash-box-style"
                      id="uuid_display"
                      rows="4"
                      readonly
                      placeholder="Waiting for hardware trigger..."
                    ></textarea>
                  </div>
                </div>

                <div class="d-flex gap-2">
                  <button
                    type="button"
                    class="btn btn-outline-secondary btn-pro flex-fill"
                    onclick="nsRegistrarTerminal.iniciarGeneracion()"
                  >
                    <i class="bi bi-arrow-clockwise me-2"></i>REESCANEAR
                  </button>
                  <button
                    type="submit"
                    class="btn btn-dark btn-pro flex-fill"
                    id="btnGuardar"
                  >
                    <i class="bi bi-shield-check me-2"></i>VINCULAR AHORA
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="card-footer bg-light p-3 text-center border-0">
            <p class="mb-0 text-muted small">
              <i class="bi bi-info-circle me-1"></i> Esta llave es
              intransferible y vincula físicamente este equipo a su cuenta.
            </p>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  var nsRegistrarTerminal = (function () {
    let caracteristicas = null;
    let uuidVisualTerminal = "";

    function urlBase64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding)
        .replace(/-/g, "+")
        .replace(/_/g, "/");
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    async function iniciarGeneracion() {
      const display = document.getElementById("uuid_display");
      const bar = document.getElementById("scan-bar");
      const infoDiv = document.getElementById("debug-info");
      const btn = document.getElementById("btnGuardar");

      // 1. SIEMPRE ACTIVAMOS LA BARRA DE ESCANEO INICIAL
      if (bar) bar.style.width = "100%";
      if (display && !localStorage.getItem("asist_vnc")) {
        display.value = "> ESCANEANDO HARDWARE...";
      }

      try {
        // 2. OBTENER SPECS REALES (Esto llena el panel izquierdo siempre)
        const resultado = await obtenerUUIDHardwareGlobal();
        caracteristicas = resultado.specs;

        // 3. ACTUALIZAR PANEL DE ADN DIGITAL (Lado izquierdo)
        if (infoDiv && caracteristicas) {
          infoDiv.innerHTML = "";
          const labels = {
            gpu: "GPU",
            cores: "CPU",
            memory: "RAM",
            screen: "Monitor",
          };
          for (const key in labels) {
            if (caracteristicas[key]) {
              infoDiv.innerHTML += `
            <div class="mb-2">
              <span class="tech-badge w-100 text-start">
                <span class="tech-label">${labels[key]}:</span> ${caracteristicas[key]}
              </span>
            </div>`;
            }
          }
        }

        // 4. VERIFICAR ESTADO DE VINCULACIÓN PARA LA TERMINAL (Lado derecho)
        const marcaEsperada = btoa("vnc_active_Dispositivo vinculado");

        if (localStorage.getItem("asist_vnc") === marcaEsperada) {
          // CASO: YA VINCULADO
          const idGuardado =
            localStorage.getItem("device_token_id") || "VNC-ACTIVE";

          setTimeout(() => {
            if (display) {
              display.value = `SISTEMA VINCULADO CORRECTAMENTE\nID: ${idGuardado}\n`;
            }
            if (bar) bar.style.width = "0%";
            if (btn) {
              btn.disabled = true;
              btn.innerHTML =
                '<i class="bi bi-lock-fill me-2"></i>EQUIPO AUTORIZADO';
            }
          }, 600);

          return; // Finalizamos aquí si ya está vinculado
        }

        // 5. CASO: NO VINCULADO (Proceso normal)
        uuidVisualTerminal =
          "NV-" + Math.random().toString(36).substring(2, 11).toUpperCase();

        setTimeout(() => {
          if (display) display.value = uuidVisualTerminal;
          if (bar) bar.style.width = "0%";
        }, 800);
      } catch (e) {
        console.error("Error en escaneo:", e);
        if (display) display.value = "ERROR EN PROTOCOLO DE HARDWARE";
        if (infoDiv)
          infoDiv.innerHTML =
            '<div class="text-danger p-3 text-center">Fallo al extraer firmas de hardware.</div>';
      }
    }
    /*********************************************************************************************/
    async function procesarFormulario(event, form) {
      event.preventDefault();
      const btn = document.getElementById("btnGuardar");

      if (!caracteristicas) {
        alertSMS("Error: No se detectaron componentes de hardware.");
        return;
      }

      btn.disabled = true;

      try {
        const user = sessionStorage.getItem("codigoUsuario");
        if (!user) throw new Error("Sesión no válida");

        // --- 🔔 NUEVO: GENERAR SUSCRIPCIÓN PUSH ---
        let suscripcionPush = null;
        try {
          const registration = await navigator.serviceWorker.ready;
          // Reemplaza 'TU_LLAVE_PUBLICA_VAPID' con tu llave real
          suscripcionPush = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(
              "BLSqiNPPi2a_AbKiDtXEJc-NQfj7X1FxRn694aahQJ4-aTLUcqmsDUVDOmeHKMKaIio9mPJ0hh2pGKu5OkRIubY",
            ),
          });
          //console.log("Suscripción Push generada con éxito");
        } catch (pushErr) {
          /*console.warn(
            "No se pudo suscribir a Push (posiblemente denegado):",
            pushErr,
          );*/
          // No bloqueamos el registro si falla el push, pero avisamos en consola
        }

        const currentClientID = localStorage.getItem("device_token_id");

        const response = await fetch(
          `${window.SUPABASE_URL}/functions/v1/asist_registrarTerminal`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: window.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({
              user: user,
              device_id: currentClientID,
              hardware_fingerprint: caracteristicas,
              push_subscription: suscripcionPush, // 🔥 ENVIAMOS EL OBJETO JSON AL SERVER
            }),
          },
        );

        const result = await response.json();

        if (response.ok && result.status === "success") {
          if (result.device_token_id) {
            localStorage.setItem("device_token_id", result.device_token_id);
          }

          if (result.tipoHW !== undefined) {
            localStorage.setItem("tipoHW", result.tipoHW);
          }

          const marcaExito = btoa("vnc_active_Dispositivo vinculado");
          localStorage.setItem("asist_vnc", marcaExito);

          alertSMS("Dispositivo vinculado correctamente ✅");
          getHome();
        } else {
          throw new Error(result.error || "Error en el servidor");
        }
      } catch (err) {
        alertSMS(err.message);
        btn.disabled = false;
      }
    }

    // Auto-ejecución al cargar
    setTimeout(iniciarGeneracion, 100);

    return { procesarFormulario, iniciarGeneracion };
  })();
</script>
