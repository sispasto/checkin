<style>
  /* --- BOTÓN DE ESCANEO RE-ESTILIZADO (MODERNO) --- */
  .btn-scan-pro {
    background: #ffffff;
    border: 1px solid #e1e4e8;
    border-radius: 24px;
    padding: 2.5rem 1.5rem;
    width: 100%;
    max-width: 320px;
    margin: 25px auto;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
    outline: none;
  }

  .btn-scan-pro:hover {
    transform: translateY(-5px);
    border-color: #00f2ff;
    box-shadow: 0 20px 40px rgba(0, 242, 255, 0.1);
  }

  .btn-scan-pro i {
    font-size: 3.8rem;
    color: #00f2ff;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.2));
  }

  .btn-text {
    font-weight: 700;
    color: #1a1d21;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 0.95rem;
  }

  /* --- CORRECCIÓN DEL QR (CUADRADO PERFECTO) --- */
  .modal-dialog {
    margin-top: 2vh !important; /* Mantiene la modal arriba */
    max-width: 450px;
  }

  .modal-content {
    background: #ffffff !important;
    border-radius: 28px !important;
    border: none !important;
    overflow: hidden;
  }

  /* Contenedor del lector para asegurar ratio 1:1 */
  #reader {
    width: 100% !important;
    border: none !important;
    background: #000;
    aspect-ratio: 1 / 1; /* FUERZA EL CUADRADO */
    overflow: hidden;
  }

  #reader video {
    object-fit: cover !important; /* Llena el cuadrado sin deformar */
    width: 100% !important;
    height: 100% !important;
  }

  /* Ajuste de la X de cerrar para que sea visible y estética */
  .btn-close {
    background-color: #f0f2f5 !important;
    border-radius: 50% !important;
    opacity: 1 !important;
    padding: 0.8rem !important;
    transition: background 0.2s;
  }

  .btn-close:hover {
    background-color: #e4e6e9 !important;
  }

  /* Badge de la hora (se mantiene el que te gustó) */
  .status-badge {
    background: #00f2ff !important;
    color: #000 !important;
    padding: 12px 28px;
    border-radius: 15px;
    font-size: 1.1rem;
    font-weight: 800;
    box-shadow: 0 8px 20px rgba(0, 242, 255, 0.3);
    font-family: "JetBrains Mono", monospace;
  }

  .ticket-container {
    background: #f8f9fa;
    border-left: 5px solid #00f2ff;
    border-radius: 15px;
    padding: 1.5rem;
    margin: 20px auto;
    max-width: 320px;
    animation: slideUp 0.4s ease-out;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .ticket-header {
    font-size: 0.75rem;
    font-weight: 800;
    color: #6c757d;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-align: center;
  }

  .ticket-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .ticket-item .label {
    font-weight: 600;
    color: #495057;
    font-size: 0.9rem;
  }

  .ticket-item .value {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    color: #1a1d21;
    font-size: 0.95rem;
  }
</style>

<div class="view-container">
  <div class="header-section text-center">
    <h3 class="title-main">ASIST-CONTROL</h3>
    <div id="hora-contenedor" class="status-badge">
      <i class="bi bi-clock-fill me-2"></i>
      <span id="reloj-cliente">00:00:00</span>
    </div>
  </div>

  <div onclick="lectorqr.abrirCamara()" class="btn-scan-pro">
    <i class="bi bi-qr-code-scan"></i>
    <span class="btn-text">Escanear Punto</span>
  </div>

  <div class="result-card shadow-sm">
    <span class="result-label">Validación de Ubicación</span>
    <span id="codigo-resultado" class="code-display text-muted small"
      >ESPERANDO ESCANEO...</span
    >
  </div>

  <div
    id="ticket-asistencia"
    class="ticket-container shadow-sm"
    style="display: none"
  >
    <div class="ticket-header">REGISTRO EXITOSO</div>
    <div class="ticket-body">
      <div class="ticket-item">
        <span class="label">FECHA:</span>
        <span id="res-fecha" class="value">--/--/--</span>
      </div>
      <div class="ticket-item">
        <span class="label">HORA:</span>
        <span id="res-hora" class="value">00:00:00</span>
      </div>
    </div>
  </div>
</div>

<div
  class="modal fade"
  id="qrModal"
  tabindex="-1"
  aria-hidden="true"
  data-bs-backdrop="static"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold">
          <i class="bi bi-camera-fill me-2 text-info"></i>ESCÁNER ACTIVO
        </h6>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body p-0">
        <div id="reader"></div>
      </div>
      <div class="modal-footer border-0 justify-content-center bg-light">
        <small class="text-secondary fw-bold"
          >Coloque el código QR en el centro</small
        >
      </div>
    </div>
  </div>
</div>

<script>
  // Mantenemos tu lógica igual, solo añadimos la confirmación auditiva (beep)
  var lectorqr = (function () {
    let html5QrCode;
    let isScanning = false;
    let horaValidada = "";
    const modalId = "qrModal";

    function abrirCamara() {
      const modalElement = document.getElementById(modalId);
      const myModal = new bootstrap.Modal(modalElement);
      myModal.show();

      // Ajuste de timing para asegurar que el DOM del modal esté listo
      setTimeout(() => {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        // Configuración refinada del escáner (qrbox más pequeño para PC)
        const config = {
          fps: 15,
          qrbox: { width: 220, height: 220 }, // Recuadro de escaneo definido
          aspectRatio: 1.0, // Fuerza formato cuadrado
        };

        html5QrCode
          .start(
            { facingMode: "environment" }, // Prioriza cámara trasera en móvil
            config,
            (text) => {
              // ÉXITO DE LECTURA
              document.getElementById("codigo-resultado").innerText = text;
              // --- NUEVO: Confirmación auditiva ---
              emitirBeep();
              pararTodo();
              // --- LLAMADA A LA FUNCIÓN DE REGISTRO ---
              enviarAsistenciaAServidor(text);
            },
          )
          .then(() => {
            isScanning = true;
            console.log("DEBUG: Cámara iniciada correctamente.");
          })
          .catch((err) => {
            console.error("DEBUG: Error al iniciar cámara:", err);
            alert("Asegúrate de dar permisos de cámara en localhost.");
          });
      }, 500);
    }

    function pararTodo() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => {
          html5QrCode.clear(); // Limpieza profunda
          isScanning = false;
          bootstrap.Modal.getInstance(document.getElementById(modalId)).hide();

          // Aquí disparas tu envío final a Supabase
          console.log("Listo para enviar:", {
            codigo: document.getElementById("codigo-resultado").innerText,
            hora: horaValidada,
          });
        });
      }
    }

    // --- NUEVO: Función para generar el sonido de "Beep" ---
    function emitirBeep() {
      // Creamos el contexto de audio
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Creamos el oscilador (genera el tono)
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain(); // Controla el volumen

      oscillator.type = "sine"; // Tipo de onda suave
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Frecuencia (Nota A5)

      // Control de volumen para que sea un "clic/beep" rápido y no molesto
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.3,
      );

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.3); // Duración de 300ms
    }

    async function enviarAsistenciaAServidor(qrContentPDS) {
      const codigoUsuario = sessionStorage.getItem("codigoUsuario");
      const deviceTokenId = localStorage.getItem("device_token_id"); // El ID de la tabla asist_terminal

      // 1. Obtener specs para generar el Hash de seguridad en el servidor
      const resultadoHardware = await obtenerUUIDHardwareGlobal();
      const specs = resultadoHardware.specs;

      alertSMS("Validando ubicación y dispositivo...");

      // 2. Obtener Geolocalización
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;

          try {
            const response = await fetch(
              `${window.SUPABASE_URL}/functions/v1/asist_registrar_asistencia`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
                },
                body: JSON.stringify({
                  codigoUsuario: codigoUsuario,
                  device_token_id: deviceTokenId, // ID único del celular
                  qr_data: qrContentPDS, // ID del PDS leído del QR
                  lat: latitude,
                  lng: longitude,
                  hardware_fingerprint: specs, // Specs para re-generar el Hash
                }),
              },
            );

            const data = await response.json();

            if (data.status === "success") {
              alertSMS("✅ ¡Asistencia Exitosa!");

              // --- MOSTRAR TICKET DE MARCACIÓN ---
              document.getElementById("res-fecha").innerText = data.fecha;
              document.getElementById("res-hora").innerText = data.hora;
              document.getElementById("ticket-asistencia").style.display =
                "block";

              // Opcional: Actualizar el label de validación
              document.getElementById("codigo-resultado").innerText =
                "REGISTRO CONFIRMADO";
              document
                .getElementById("codigo-resultado")
                .classList.replace("text-muted", "text-success");
            } else {
              // Si hay error, ocultamos el ticket por si había uno previo
              document.getElementById("ticket-asistencia").style.display =
                "none";
              alertSMS("❌ Error: " + (data.message || data.errorCode));
            }
            //fin de success
          } catch (error) {
            console.error("Error en la petición:", error);
            document.getElementById("ticket-asistencia").style.display = "none";
            alertSMS("Error de red: No se pudo conectar con el servidor.");
          }
        },
        (error) => {
          document.getElementById("ticket-asistencia").style.display = "none";
          alertSMS("⚠️ Error: El GPS es obligatorio para marcar asistencia.");
        },
        {
          enableHighAccuracy: true,
          timeout: 5000,
          maximumAge: 0,
        },
      );
    }

    // 1. Nueva función de reloj (Agrégala al inicio del módulo)
    function iniciarReloj() {
      const relojSpan = document.getElementById("reloj-cliente");
      setInterval(() => {
        const ahora = new Date();
        // Formato 24h tipo Colombia
        relojSpan.innerText = ahora.toLocaleTimeString("es-CO", {
          hour12: false,
        });
      }, 1000);
    }

    // 2. Borra la función iniciarProceso() completa.

    // 3. Al final del return, antes de cerrar el módulo, inicia el reloj:
    iniciarReloj();

    return { abrirCamara }; // Solo exponemos abrirCamara
  })();
</script>
