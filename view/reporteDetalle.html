<style>
  /* --- Contenedor Principal --- */
  .card-reporte {
    background: #0d1117 !important; /* Fondo negro profundo */
    border: 1px solid #30363d !important;
    border-radius: 16px !important;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5) !important;
  }

  /* --- Header --- */
  .card-header {
    background: #161b22 !important;
    border-bottom: 1px solid #30363d !important;
    padding: 20px !important;
  }

  /* --- Sección de Filtro --- */
  .filtro-fecha {
    background-color: #0d1117;
    border: 1px solid #30363d;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 25px;
  }

  .input-dark {
    background-color: #161b22;
    border: 1px solid #444c56;
    color: #ffffff;
    font-weight: 500;
  }

  /* Botón de búsqueda NEGRO con estilo premium */
  .btn-filter {
    background-color: #000000 !important;
    color: #58a6ff !important; /* Texto azul cian */
    border: 1px solid #58a6ff !important;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(88, 166, 255, 0.1);
  }

  .btn-filter:hover {
    background-color: #58a6ff !important;
    color: #000000 !important;
    box-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
  }

  /* --- Tarjetas de Agentes (Gris Metálico) --- */
  .registro-agente {
    background: #1c2128; /* Gris azulado metálico que resalta sobre el negro */
    border: 1px solid #444c56;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 15px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
  }

  .agente-nombre {
    border-bottom: 1px solid #30363d;
    padding-bottom: 10px;
    margin-bottom: 12px;
  }

  .nombre-texto {
    color: #ffffff;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* --- Bloques de Marcación (Fondo profundo para contraste interno) --- */
  .grid-marcaciones {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .bloque-turno {
    background: #0d1117; /* Fondo negro dentro de la tarjeta gris */
    border: 1px solid #30363d;
    padding: 12px 5px;
    border-radius: 10px;
    text-align: center;
  }

  .turno-label {
    font-size: 0.7rem;
    color: #8b949e;
    font-weight: 800;
    margin-bottom: 4px;
    display: block;
    text-transform: uppercase;
  }

  .turno-hora {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.95rem;
    font-weight: 700;
  }

  /* --- Colores de Estado --- */
  .text-ok {
    color: #3fb950;
    text-shadow: 0 0 5px rgba(63, 185, 80, 0.3);
  }
  .text-warn {
    color: #d29922;
    text-shadow: 0 0 5px rgba(210, 153, 34, 0.3);
  }
  .text-falta {
    color: #f85149;
    text-shadow: 0 0 5px rgba(248, 81, 73, 0.3);
  }
  .text-secondary {
    color: #484f58;
  }

  /* Footer */
  .card-footer {
    background: #000000 !important;
    border-top: 1px solid #30363d !important;
  }
</style>

<div class="container mt-3 mb-5">
  <div
    class="card card-reporte text-white shadow-lg"
    style="background: #0d1117"
  >
    <div
      class="card-header bg-gradient-dark py-3 border-secondary d-flex justify-content-between align-items-center"
    >
      <h6 class="mb-0 text-info fw-bold">
        <i class="bi bi-person-check-fill me-2"></i>CONTROL DE ASISTENCIA
      </h6>
    </div>

    <div class="card-body p-3">
      <div class="filtro-fecha">
        <div class="row g-2 align-items-end">
          <div class="col-10">
            <label class="text-secondary small d-block mb-1"
              >Seleccionar Fecha:</label
            >
            <input
              type="date"
              id="input-fecha"
              class="form-control input-dark w-100"
            />
          </div>
          <div class="col-2 text-end">
            <button
              onclick="nsReporteAsistencia.cargarMatriz()"
              class="btn btn-filter w-100"
            >
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="loader-reporte" class="text-center py-5 d-none">
        <div class="spinner-border text-info" role="status"></div>
        <p class="text-secondary small mt-2 font-monospace">SINCRONIZANDO...</p>
      </div>

      <div id="contenido-reporte" class="lista-asistencia"></div>
    </div>

    <div class="card-footer bg-black text-center py-3">
      <button
        onclick="window.location.hash = '#/'"
        class="btn btn-outline-secondary btn-sm w-100"
      >
        <i class="bi bi-arrow-left me-2"></i>VOLVER AL PANEL
      </button>
    </div>
  </div>
</div>

<script>
  window.nsReporteAsistencia = (function () {
    const _getDom = () => ({
      contenedor: document.getElementById("contenido-reporte"),
      loader: document.getElementById("loader-reporte"),
      inputFecha: document.getElementById("input-fecha"),
    });

    async function cargarMatriz() {
      const dom = _getDom();
      if (!dom.contenedor || !dom.loader) return;

      const fechaSeleccionada = dom.inputFecha.value;

      dom.loader.classList.remove("d-none");
      dom.contenedor.classList.add("d-none");
      dom.contenedor.innerHTML = "";

      try {
        const response = await fetch(
          `${window.SUPABASE_URL}/functions/v1/asist_get_reporte_detalle`, // Asegúrate que el nombre sea correcto
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: window.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ fecha: fechaSeleccionada }),
          },
        );

        const result = await response.json();
        if (!response.ok)
          throw new Error(result.error || "Error de comunicación");

        if (!result.data || result.data.length === 0) {
          dom.contenedor.innerHTML = `
            <div class="text-center py-5 px-3">
              <i class="bi bi-search text-secondary fs-1 mb-3 d-block"></i>
              <h6 class="text-white-50">SIN REGISTROS</h6>
              <p class="small text-muted font-monospace">No hay marcas para el ${fechaSeleccionada}</p>
            </div>`;
        } else {
          let htmlAcumulado = "";
          result.data.forEach((p) => {
            const formatTurno = (label, data) => {
              let color = "text-ok";
              const estado = (data.estado || "").toUpperCase();

              if (estado === "FALTA") color = "text-falta";
              else if (estado === "TARDE") color = "text-warn";
              else if (estado !== "A TIEMPO" && estado !== "AL DIA")
                color = "text-secondary";

              return `
                <div class="bloque-turno">
                  <span class="turno-label">${label}</span>
                  <span class="turno-hora ${color}">${data.hora || "--:--"}</span>
                </div>`;
            };

            htmlAcumulado += `
            <div class="registro-agente">
              <div class="agente-nombre">
                <span class="nombre-texto">${p.info.nombre}</span>
                <span class="text-secondary small fw-bold">ID: ${p.info.codigo}</span>
              </div>
              <div class="grid-marcaciones">
                ${formatTurno("E1", p.e1)}
                ${formatTurno("S1", p.s1)}
                ${formatTurno("E2", p.e2)}
                ${formatTurno("S2", p.s2)}
              </div>
            </div>`;
          });
          dom.contenedor.innerHTML = htmlAcumulado;
        }
      } catch (err) {
        console.error("Error en Matriz:", err);
        dom.contenedor.innerHTML = `<div class="alert alert-danger m-3 small">ERROR: ${err.message}</div>`;
      } finally {
        dom.loader.classList.add("d-none");
        dom.contenedor.classList.remove("d-none");
      }
    }

    setTimeout(() => {
      const dom = _getDom();
      if (dom.inputFecha) {
        const hoy = new Date().toLocaleDateString("en-CA", {
          timeZone: "America/Bogota",
        });
        dom.inputFecha.value = hoy;
      }
      cargarMatriz();
    }, 200);

    return { cargarMatriz };
  })();
</script>
