<style>
  .card-reporte {
    background-color: #0d1117 !important;
    border-radius: 15px !important;
    max-width: 500px; /* Tamaño ideal para móvil */
    margin: auto;
    border: 1px solid #30363d !important;
  }

  /* Contenedor de la lista */
  .lista-asistencia {
    padding: 0;
    margin: 0;
  }

  .registro-agente {
    border-bottom: 1px solid #21262d;
    padding: 12px 15px;
    transition: background 0.2s;
  }

  .registro-agente:nth-child(even) {
    background-color: #161b2255;
  }

  /* Primera fila: Nombre */
  .agente-nombre {
    color: #58a6ff;
    font-weight: bold;
    font-size: 0.85rem;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  /* Segunda fila: Las 4 marcaciones */
  .grid-marcaciones {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .bloque-turno {
    text-align: center;
    background: #00000044;
    padding: 5px;
    border-radius: 6px;
    border: 1px solid #30363d;
  }

  .turno-label {
    display: block;
    font-size: 9px;
    color: #8b949e;
    margin-bottom: 2px;
  }

  .turno-hora {
    display: block;
    font-family: "Fira Code", monospace;
    font-size: 0.75rem;
    font-weight: bold;
  }

  /* Estados */
  .text-falta {
    color: #ff7b72;
  }
  .text-ok {
    color: #3fb950;
  }
  .text-warn {
    color: #d29922;
  }
</style>

<div class="container mt-3 mb-5">
  <div class="card card-reporte text-white shadow-lg">
    <div
      class="card-header bg-gradient-dark py-3 border-secondary d-flex justify-content-between align-items-center"
    >
      <h6 class="mb-0 text-info fw-bold">
        <i class="bi bi-person-check-fill me-2"></i>CONTROL DE ASISTENCIA
      </h6>
      <span class="badge bg-dark border border-secondary text-secondary"
        >{{fecha}}</span
      >
    </div>

    <div class="card-body p-0">
      <div id="loader-reporte" class="text-center py-5">
        <div class="spinner-border text-info" role="status"></div>
        <p class="text-secondary small mt-2 font-monospace">SINCRONIZANDO...</p>
      </div>

      <div id="contenido-reporte" class="d-none lista-asistencia"></div>
    </div>

    <div class="card-footer bg-black text-center py-3">
      <button
        onclick="window.location.hash = '#/'"
        class="btn btn-outline-secondary btn-sm w-100"
      >
        <i class="bi bi-arrow-left me-2"></i>VOLVER AL PANEL
      </button>
    </div>
  </div>
</div>

<script>
  (async function () {
    const contenedor = document.getElementById("contenido-reporte");
    const loader = document.getElementById("loader-reporte");

    async function cargarMatriz() {
      try {
        const response = await fetch(
          `${window.SUPABASE_URL}/functions/v1/asist_get_reporte_completo`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: window.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ fecha: FECHA_URL }),
          },
        );

        const result = await response.json();
        if (!response.ok) throw new Error(result.error);

        contenedor.innerHTML = "";

        result.data.forEach((p) => {
          // Función para generar el HTML de cada turno
          const formatTurno = (label, data) => {
            let color = "text-ok";
            if (data.estado === "FALTA") color = "text-falta";
            else if (data.estado !== "A TIEMPO" && data.estado !== "AL DIA")
              color = "text-warn";

            return `
              <div class="bloque-turno">
                <span class="turno-label">\${label}</span>
                <span class="turno-hora \${color}">\${data.hora}</span>
              </div>
            `;
          };

          const htmlRegistro = `
            <div class="registro-agente">
              <div class="agente-nombre">
                <span>\${p.info.nombre}</span>
                <span class="text-secondary" style="font-size: 10px;">ID: \${p.info.codigo}</span>
              </div>
              
              <div class="grid-marcaciones">
                \${formatTurno('E1', p.e1)}
                \${formatTurno('S1', p.s1)}
                \${formatTurno('E2', p.e2)}
                \${formatTurno('S2', p.s2)}
              </div>
            </div>
          `;
          contenedor.innerHTML += htmlRegistro;
        });

        loader.classList.add("d-none");
        contenedor.classList.remove("d-none");
      } catch (err) {
        console.error("Error:", err);
        loader.innerHTML = `<p class="text-danger p-4 font-monospace">Error: \${err.message}</p>`;
      }
    }

    cargarMatriz();
  })();
</script>
