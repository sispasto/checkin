<style>
  /* ... (Tus estilos anteriores se mantienen) ... */
  .filtro-fecha {
    background-color: #161b22;
    border: 1px solid #30363d;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
  }
  .input-dark {
    background-color: #0d1117;
    border: 1px solid #30363d;
    color: white;
    font-size: 0.8rem;
    border-radius: 5px;
    padding: 5px;
  }
  .btn-filter {
    background-color: #238636;
    color: white;
    border: none;
    padding: 5px 15px;
    border-radius: 5px;
    font-size: 0.8rem;
  }
</style>

<div class="container mt-3 mb-5">
  <div class="card card-reporte text-white shadow-lg">
    <div
      class="card-header bg-gradient-dark py-3 border-secondary d-flex justify-content-between align-items-center"
    >
      <h6 class="mb-0 text-info fw-bold">
        <i class="bi bi-person-check-fill me-2"></i>CONTROL DE ASISTENCIA
      </h6>
    </div>

    <div class="card-body p-3">
      <div class="filtro-fecha">
        <div class="row g-2 align-items-end">
          <div class="col-10">
            <label class="text-secondary small d-block mb-1"
              >Seleccionar Fecha:</label
            >
            <input
              type="date"
              id="input-fecha"
              class="form-control input-dark w-100"
            />
          </div>
          <div class="col-2 text-end">
            <button onclick="cargarMatriz()" class="btn btn-filter w-100">
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="loader-reporte" class="text-center py-5 d-none">
        <div class="spinner-border text-info" role="status"></div>
        <p class="text-secondary small mt-2 font-monospace">SINCRONIZANDO...</p>
      </div>

      <div id="contenido-reporte" class="lista-asistencia"></div>
    </div>

    <div class="card-footer bg-black text-center py-3">
      <button
        onclick="window.location.hash = '#/'"
        class="btn btn-outline-secondary btn-sm w-100"
      >
        <i class="bi bi-arrow-left me-2"></i>VOLVER AL PANEL
      </button>
    </div>
  </div>
</div>

<script>
  // 1. Referencias a elementos del DOM
  const contenedor = document.getElementById("contenido-reporte");
  const loader = document.getElementById("loader-reporte");
  const inputFecha = document.getElementById("input-fecha");

  // 2. Establecer fecha de hoy por defecto (Formato YYYY-MM-DD)
  const hoy = new Date().toLocaleDateString("en-CA", {
    timeZone: "America/Bogota",
  });
  if (inputFecha) inputFecha.value = hoy;

  // 3. Función principal de carga
  async function cargarMatriz() {
    // Validar que tengamos los elementos necesarios
    if (!contenedor || !loader) return;

    const fechaSeleccionada = inputFecha.value;

    // Reset de interfaz
    loader.classList.remove("d-none");
    contenedor.classList.add("d-none");
    contenedor.innerHTML = "";

    try {
      const response = await fetch(
        `${window.SUPABASE_URL}/functions/v1/asist_get_reporte_completo`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: window.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({ fecha: fechaSeleccionada }),
        },
      );

      const result = await response.json();
      if (!response.ok) throw new Error(result.error || "Error en el servidor");

      // --- VALIDACIÓN DE DATOS ---
      if (!result.data || result.data.length === 0) {
        contenedor.innerHTML = `
          <div class="text-center py-5 px-3">
            <i class="bi bi-search text-secondary fs-1 mb-3 d-block"></i>
            <h6 class="text-white-50">SIN REGISTROS</h6>
            <p class="small text-muted font-monospace">No hay marcas para el ${fechaSeleccionada}</p>
          </div>
        `;
      } else {
        // --- RENDERIZADO DE LA MATRIZ ---
        let htmlAcumulado = "";

        result.data.forEach((p) => {
          const formatTurno = (label, data) => {
            let color = "text-ok";
            const estado = (data.estado || "").toUpperCase();

            if (estado === "FALTA") color = "text-falta";
            else if (estado !== "A TIEMPO" && estado !== "AL DIA")
              color = "text-warn";

            return `
              <div class="bloque-turno">
                <span class="turno-label">${label}</span>
                <span class="turno-hora ${color}">${data.hora || "--:--"}</span>
              </div>
            `;
          };

          htmlAcumulado += `
            <div class="registro-agente">
              <div class="agente-nombre">
                <span>${p.info.nombre}</span>
                <span class="text-secondary" style="font-size: 10px;">ID: ${p.info.codigo}</span>
              </div>
              <div class="grid-marcaciones">
                ${formatTurno("E1", p.e1)}
                ${formatTurno("S1", p.s1)}
                ${formatTurno("E2", p.e2)}
                ${formatTurno("S2", p.s2)}
              </div>
            </div>
          `;
        }); // <-- Aquí faltaba esta llave de cierre

        contenedor.innerHTML = htmlAcumulado;
      }
    } catch (err) {
      console.error("Error cargando reporte:", err);
      contenedor.innerHTML = `
        <div class="alert alert-danger m-3 font-monospace" style="font-size: 11px;">
          <i class="bi bi-exclamation-octagon me-2"></i>ERROR: ${err.message}
        </div>
      `;
    } finally {
      loader.classList.add("d-none");
      contenedor.classList.remove("d-none");
    }
  }

  // 4. Ejecución inicial
  document.addEventListener("DOMContentLoaded", () => {
    cargarMatriz();
  });
</script>
