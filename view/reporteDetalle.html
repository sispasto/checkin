<style>
  /* --- Contenedor Principal (Profundidad Absoluta) --- */
  .card-reporte {
    background: #000000 !important;
    border: 1px solid #1a1d23 !important;
    border-radius: 24px !important;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9) !important;
    padding: 10px;
  }

  .card-header {
    background: transparent !important;
    border-bottom: 1px solid #1a1d23 !important;
    padding: 25px !important;
  }

  /* --- El 'Input' de Fecha Estilo Terminal --- */
  .filtro-fecha {
    background-color: #080a0f;
    border: 1px solid #1a1d23;
    padding: 20px;
    border-radius: 18px;
    margin-bottom: 30px;
  }

  .input-dark {
    background-color: #000000 !important;
    border: 1px solid #30363d !important;
    color: #00d4ff !important;
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    text-align: center;
    border-radius: 10px !important;
    transition: all 0.3s;
  }

  .input-dark:focus {
    border-color: #00d4ff !important;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
  }

  /* Botón de búsqueda Minimalista */
  .btn-filter {
    background-color: #ffffff !important;
    color: #000000 !important;
    border: none !important;
    border-radius: 10px !important;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .btn-filter:hover {
    transform: scale(1.05);
    background-color: #00d4ff !important;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
  }

  /* --- Tarjetas 'White-Glass' de Agentes --- */
  .registro-agente {
    background: #ffffff;
    border: none;
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 20px;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  /* Efecto de borde de luz al pasar el mouse */
  .registro-agente:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0, 212, 255, 0.15);
  }

  .agente-nombre {
    border-bottom: 2px solid #f4f6f8;
    padding-bottom: 15px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nombre-texto {
    color: #0d1117;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: -0.8px;
  }

  /* --- Grid de Marcación Estilo 'Pods' --- */
  .grid-marcaciones {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
  }

  .bloque-turno {
    background: #f8fafc; /* Gris nube sutil */
    border: 1px solid #edf2f7;
    padding: 15px 5px;
    border-radius: 15px;
    text-align: center;
    transition: all 0.3s;
  }

  .registro-agente:hover .bloque-turno {
    background: #ffffff;
    border-color: #e2e8f0;
  }

  .turno-label {
    font-size: 0.65rem;
    color: #94a3b8;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: block;
  }

  .turno-hora {
    font-family: "JetBrains Mono", monospace;
    font-size: 1.05rem;
    font-weight: 900;
    color: #1e293b;
  }

  /* --- Status Colors --- */
  .text-ok {
    color: #10b981 !important;
  } /* Esmeralda */
  .text-warn {
    color: #f59e0b !important;
  } /* Ámbar */
  .text-falta {
    color: #ef4444 !important;
  } /* Rosa Eléctrico */

  /* Footer Minimal */
  .card-footer {
    background: transparent !important;
    border-top: 1px solid #1a1d23 !important;
    padding: 25px !important;
  }

  .btn-outline-secondary {
    border-color: #30363d !important;
    color: #8b949e !important;
    border-radius: 12px;
  }
</style>

<div class="container mt-3 mb-5">
  <div
    class="card card-reporte text-white shadow-lg"
    style="background: #0d1117"
  >
    <div
      class="card-header bg-gradient-dark py-3 border-secondary d-flex justify-content-between align-items-center"
    >
      <h6 class="mb-0 text-info fw-bold">
        <i class="bi bi-person-check-fill me-2"></i>CONTROL DE ASISTENCIA
      </h6>
    </div>

    <div class="card-body p-3">
      <div class="filtro-fecha">
        <div class="row g-2 align-items-end">
          <div class="col-10">
            <label class="text-secondary small d-block mb-1"
              >Seleccionar Fecha:</label
            >
            <input
              type="date"
              id="input-fecha"
              class="form-control input-dark w-100"
            />
          </div>
          <div class="col-2 text-end">
            <button
              onclick="nsReporteAsistencia.cargarMatriz()"
              class="btn btn-filter w-100"
            >
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="loader-reporte" class="text-center py-5 d-none">
        <div class="spinner-border text-info" role="status"></div>
        <p class="text-secondary small mt-2 font-monospace">SINCRONIZANDO...</p>
      </div>

      <div id="contenido-reporte" class="lista-asistencia"></div>
    </div>

    <div class="card-footer bg-black text-center py-3">
      <button
        onclick="window.location.hash = '#/'"
        class="btn btn-outline-secondary btn-sm w-100"
      >
        <i class="bi bi-arrow-left me-2"></i>VOLVER AL PANEL
      </button>
    </div>
  </div>
</div>

<script>
  window.nsReporteAsistencia = (function () {
    const _getDom = () => ({
      contenedor: document.getElementById("contenido-reporte"),
      loader: document.getElementById("loader-reporte"),
      inputFecha: document.getElementById("input-fecha"),
    });

    async function cargarMatriz() {
      const dom = _getDom();
      if (!dom.contenedor || !dom.loader) return;

      const fechaSeleccionada = dom.inputFecha.value;

      dom.loader.classList.remove("d-none");
      dom.contenedor.classList.add("d-none");
      dom.contenedor.innerHTML = "";

      try {
        const response = await fetch(
          `${window.SUPABASE_URL}/functions/v1/asist_get_reporte_detalle`, // Asegúrate que el nombre sea correcto
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: window.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ fecha: fechaSeleccionada }),
          },
        );

        const result = await response.json();
        if (!response.ok)
          throw new Error(result.error || "Error de comunicación");

        if (!result.data || result.data.length === 0) {
          dom.contenedor.innerHTML = `
            <div class="text-center py-5 px-3">
              <i class="bi bi-search text-secondary fs-1 mb-3 d-block"></i>
              <h6 class="text-white-50">SIN REGISTROS</h6>
              <p class="small text-muted font-monospace">No hay marcas para el ${fechaSeleccionada}</p>
            </div>`;
        } else {
          let htmlAcumulado = "";
          result.data.forEach((p) => {
            const formatTurno = (label, data) => {
              let color = "text-ok";
              const estado = (data.estado || "").toUpperCase();

              if (estado === "FALTA") color = "text-falta";
              else if (estado === "TARDE") color = "text-warn";
              else if (estado !== "A TIEMPO" && estado !== "AL DIA")
                color = "text-secondary";

              return `
                <div class="bloque-turno">
                  <span class="turno-label">${label}</span>
                  <span class="turno-hora ${color}">${data.hora || "--:--"}</span>
                </div>`;
            };

            htmlAcumulado += `
            <div class="registro-agente">
              <div class="agente-nombre">
                <span class="nombre-texto">${p.info.nombre}</span>
                <span class="text-secondary small fw-bold">ID: ${p.info.codigo}</span>
              </div>
              <div class="grid-marcaciones">
                ${formatTurno("E1", p.e1)}
                ${formatTurno("S1", p.s1)}
                ${formatTurno("E2", p.e2)}
                ${formatTurno("S2", p.s2)}
              </div>
            </div>`;
          });
          dom.contenedor.innerHTML = htmlAcumulado;
        }
      } catch (err) {
        console.error("Error en Matriz:", err);
        dom.contenedor.innerHTML = `<div class="alert alert-danger m-3 small">ERROR: ${err.message}</div>`;
      } finally {
        dom.loader.classList.add("d-none");
        dom.contenedor.classList.remove("d-none");
      }
    }

    setTimeout(() => {
      const dom = _getDom();
      if (dom.inputFecha) {
        const hoy = new Date().toLocaleDateString("en-CA", {
          timeZone: "America/Bogota",
        });
        dom.inputFecha.value = hoy;
      }
      cargarMatriz();
    }, 200);

    return { cargarMatriz };
  })();
</script>
