<style>
  /* --- Contenedor Principal --- */
  .card-reporte {
    background: rgba(
      255,
      255,
      255,
      0.7
    ) !important; /* Fondo claro traslúcido */
    backdrop-filter: blur(15px) saturate(150%);
    -webkit-backdrop-filter: blur(15px) saturate(150%);
    border: 1px solid rgba(255, 255, 255, 0.3) !important;
    border-radius: 16px !important;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15) !important;
    overflow: hidden;
  }

  /* --- Encabezado Azul Sólido --- */
  .card-header {
    background: #0047c7 !important; /* Azul intenso de la imagen */
    padding: 20px 25px !important;
    border-bottom: none !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-title {
    color: #ffffff !important;
    font-weight: 700;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* --- Filtro de Fecha (Integrado en Header) --- */
  .input-fecha-glass {
    background: rgba(255, 255, 255, 0.15) !important;
    border: 1px solid rgba(255, 255, 255, 0.3) !important;
    color: #ffffff !important;
    border-radius: 10px;
    padding: 5px 15px;
    font-weight: 600;
  }

  /* --- Estructura de Tabla --- */
  .tabla-asistencia {
    width: 100%;
    border-collapse: collapse;
  }

  .header-labels {
    background: #0056ed !important; /* Un azul un poco más claro para los títulos */
    color: #ffffff;
    text-transform: uppercase;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.5px;
  }

  .header-labels th {
    padding: 12px 15px;
    border: none;
  }

  /* --- Filas de Agentes --- */
  .fila-agente {
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    transition: background 0.3s;
  }

  .fila-agente:hover {
    background: rgba(255, 255, 255, 0.4);
  }

  .agente-info {
    padding: 15px 25px !important;
  }

  .nombre-txt {
    color: #1e293b;
    font-weight: 700;
    font-size: 0.9rem;
    display: block;
  }

  .id-txt {
    color: #64748b;
    font-size: 0.75rem;
    font-weight: 600;
  }

  /* --- Cajas de Marcación --- */
  .caja-vacia {
    color: #ef4444; /* Rojo suave */
    font-weight: 700;
    border: 1px solid rgba(239, 68, 68, 0.15);
    background: rgba(239, 68, 68, 0.02);
  }

  .caja-ok {
    color: #10b981; /* Verde esmeralda */
    font-weight: 700;
    border: 1px solid rgba(16, 185, 129, 0.15);
    background: rgba(16, 185, 129, 0.02);
  }

  .caja-discreta {
    border-radius: 10px;
    padding: 10px;
    min-width: 85px;
    text-align: center;
    font-family: "Inter", sans-serif;
  }
</style>

<div class="container mt-3 mb-5">
  <div
    class="card card-reporte text-white shadow-lg"
    style="background: #0d1117"
  >
    <div
      class="card-header bg-gradient-dark py-3 border-secondary d-flex justify-content-between align-items-center"
    >
      <h6 class="mb-0 text-info fw-bold">
        <i class="bi bi-person-check-fill me-2"></i>CONTROL DE ASISTENCIA
      </h6>
    </div>

    <div class="card-body p-3">
      <div class="filtro-fecha">
        <div class="row g-2 align-items-end">
          <div class="col-10">
            <label class="text-secondary small d-block mb-1"
              >Seleccionar Fecha:</label
            >
            <input
              type="date"
              id="input-fecha"
              class="form-control input-dark w-100"
            />
          </div>
          <div class="col-2 text-end">
            <button
              onclick="nsReporteAsistencia.cargarMatriz()"
              class="btn btn-filter w-100"
            >
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="loader-reporte" class="text-center py-5 d-none">
        <div class="spinner-border text-info" role="status"></div>
        <p class="text-secondary small mt-2 font-monospace">SINCRONIZANDO...</p>
      </div>

      <div id="contenido-reporte" class="lista-asistencia"></div>
    </div>

    <div class="card-footer bg-black text-center py-3">
      <button
        onclick="window.location.hash = '#/'"
        class="btn btn-outline-secondary btn-sm w-100"
      >
        <i class="bi bi-arrow-left me-2"></i>VOLVER AL PANEL
      </button>
    </div>
  </div>
</div>

<script>
  window.nsReporteAsistencia = (function () {
    const _getDom = () => ({
      contenedor: document.getElementById("contenido-reporte"),
      loader: document.getElementById("loader-reporte"),
      inputFecha: document.getElementById("input-fecha"),
    });

    async function cargarMatriz() {
      const dom = _getDom();
      if (!dom.contenedor || !dom.loader) return;

      const fechaSeleccionada = dom.inputFecha.value;

      dom.loader.classList.remove("d-none");
      dom.contenedor.classList.add("d-none");
      dom.contenedor.innerHTML = "";

      try {
        const response = await fetch(
          `${window.SUPABASE_URL}/functions/v1/asist_get_reporte_detalle`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: window.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ fecha: fechaSeleccionada }),
          },
        );

        const result = await response.json();
        if (!response.ok)
          throw new Error(result.error || "Error de comunicación");

        if (!result.data || result.data.length === 0) {
          dom.contenedor.innerHTML = `
            <div class="text-center py-5 px-3">
              <i class="bi bi-search text-secondary fs-1 mb-3 d-block"></i>
              <h6 class="text-muted">SIN REGISTROS</h6>
              <p class="small text-muted">No hay marcas para el ${fechaSeleccionada}</p>
            </div>`;
        } else {
          // --- CONSTRUCCIÓN DE LA TABLA "SOFT-CLEAN" ---
          // ... dentro del else de cargarMatriz ...
          let htmlAcumulado = `
            <div class="table-responsive">
              <table class="tabla-asistencia">
                <thead>
                  <tr class="header-labels text-center">
                    <th class="text-start ps-5">NOMBRE COMPLETO</th>
                    <th>E1</th>
                    <th>S1</th>
                    <th>E2</th>
                    <th>S2</th>
                  </tr>
                </thead>
                <tbody>
          `;

          result.data.forEach((p) => {
            const renderMarca = (obj) => {
              const esFalta =
                obj.hora === "--:--" ||
                (obj.estado || "").toUpperCase() === "FALTA";
              const claseStatus = esFalta ? "caja-vacia" : "caja-ok";
              return `
              <td class="text-center">
                <div class="caja-discreta ${claseStatus}">
                  ${obj.hora || "--:--"}
                </div>
              </td>`;
            };

            htmlAcumulado += `
              <tr class="fila-agente">
                <td class="agente-info">
                  <span class="nombre-txt">${p.info.nombre}</span>
                  <span class="id-txt">ID: ${p.info.codigo}</span>
                </td>
                ${renderMarca(p.e1)}
                ${renderMarca(p.s1)}
                ${renderMarca(p.e2)}
                ${renderMarca(p.s2)}
              </tr>
            `;
          });

          htmlAcumulado += `</tbody></table></div>`;
          dom.contenedor.innerHTML = htmlAcumulado;
        }
      } catch (err) {
        console.error("Error en Matriz:", err);
        dom.contenedor.innerHTML = `<div class="alert alert-danger m-3 small">ERROR: ${err.message}</div>`;
      } finally {
        dom.loader.classList.add("d-none");
        dom.contenedor.classList.remove("d-none");
      }
    }

    setTimeout(() => {
      const dom = _getDom();
      if (dom.inputFecha) {
        const hoy = new Date().toLocaleDateString("en-CA", {
          timeZone: "America/Bogota",
        });
        dom.inputFecha.value = hoy;
      }
      cargarMatriz();
    }, 200);

    return { cargarMatriz };
  })();
</script>
