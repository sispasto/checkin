<style>
  /* --- Contenedor Principal Estilo Planilla --- */
  .card-reporte {
    background: #ffffff !important;
    border: 1px solid #dee2e6 !important;
    border-radius: 4px !important; /* Bordes más rectos, más serio */
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05) !important;
    overflow: hidden;
  }

  /* --- Encabezado Negro Superior --- */
  .card-header {
    background: #212529 !important;
    padding: 10px 20px !important;
    border-bottom: none !important;
  }

  .header-title {
    color: #ffffff !important;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* --- Tabla Principal --- */
  .tabla-planilla {
    width: 100%;
    border-collapse: collapse;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  }

  /* --- Encabezado de Columnas (Gris Carbón) --- */
  .header-labels {
    background: #343a40 !important;
    color: #ffffff !important;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }

  .header-labels th {
    padding: 8px 12px !important;
    border: 1px solid #454d55 !important; /* Bordes visibles entre títulos */
    text-align: center;
  }

  /* --- Filas de Datos --- */
  .fila-planilla {
    background: #ffffff;
    border-bottom: 1px solid #dee2e6;
  }

  .fila-planilla:nth-child(even) {
    background: #f8f9fa; /* Efecto cebra para legibilidad */
  }

  .fila-planilla:hover {
    background: #f1f3f5;
  }

  .celda-datos {
    padding: 8px 12px !important;
    border-right: 1px solid #dee2e6;
    font-size: 0.85rem;
    vertical-align: middle;
  }

  .nombre-txt {
    color: #212529;
    font-weight: 700;
    text-transform: uppercase;
  }

  .id-txt {
    color: #6c757d;
    font-size: 0.7rem;
    display: block;
  }

  /* --- Marcaciones con Badges (Estilo 'CRÉDITO') --- */
  .badge-planilla {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 800;
    min-width: 65px;
    text-align: center;
  }

  /* Colores basados en la imagen de referencia */
  .status-ok {
    background: #d1e7dd;
    color: #0f5132;
  } /* Verde suave */
  .status-tarde {
    background: #ffc107;
    color: #000000;
  } /* Amarillo 'CRÉDITO' */
  .status-falta {
    background: #f8d7da;
    color: #842029;
  } /* Rojo suave */
</style>

<div class="container mt-3 mb-5">
  <div
    class="card card-reporte text-white shadow-lg"
    style="background: #0d1117"
  >
    <div
      class="card-header bg-gradient-dark py-3 border-secondary d-flex justify-content-between align-items-center"
    >
      <h6 class="mb-0 text-info fw-bold">
        <i class="bi bi-person-check-fill me-2"></i>CONTROL DE ASISTENCIA
      </h6>
    </div>

    <div class="card-body p-3">
      <div class="filtro-fecha">
        <div class="row g-2 align-items-end">
          <div class="col-10">
            <label class="text-secondary small d-block mb-1"
              >Seleccionar Fecha:</label
            >
            <input
              type="date"
              id="input-fecha"
              class="form-control input-dark w-100"
            />
          </div>
          <div class="col-2 text-end">
            <button
              onclick="nsReporteAsistencia.cargarMatriz()"
              class="btn btn-filter w-100"
            >
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="loader-reporte" class="text-center py-5 d-none">
        <div class="spinner-border text-info" role="status"></div>
        <p class="text-secondary small mt-2 font-monospace">SINCRONIZANDO...</p>
      </div>

      <div id="contenido-reporte" class="lista-asistencia"></div>
    </div>

    <div class="card-footer bg-black text-center py-3">
      <button
        onclick="window.location.hash = '#/'"
        class="btn btn-outline-secondary btn-sm w-100"
      >
        <i class="bi bi-arrow-left me-2"></i>VOLVER AL PANEL
      </button>
    </div>
  </div>
</div>

<script>
  window.nsReporteAsistencia = (function () {
    const _getDom = () => ({
      contenedor: document.getElementById("contenido-reporte"),
      loader: document.getElementById("loader-reporte"),
      inputFecha: document.getElementById("input-fecha"),
    });

    async function cargarMatriz() {
      const dom = _getDom();
      if (!dom.contenedor || !dom.loader) return;

      const fechaSeleccionada = dom.inputFecha.value;

      dom.loader.classList.remove("d-none");
      dom.contenedor.classList.add("d-none");
      dom.contenedor.innerHTML = "";

      try {
        const response = await fetch(
          `${window.SUPABASE_URL}/functions/v1/asist_get_reporte_detalle`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: window.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ fecha: fechaSeleccionada }),
          },
        );

        const result = await response.json();
        if (!response.ok)
          throw new Error(result.error || "Error de comunicación");

        if (!result.data || result.data.length === 0) {
          dom.contenedor.innerHTML = `
            <div class="text-center py-5 px-3">
              <i class="bi bi-search text-secondary fs-1 mb-3 d-block"></i>
              <h6 class="text-muted">SIN REGISTROS</h6>
              <p class="small text-muted">No hay marcas para el ${fechaSeleccionada}</p>
            </div>`;
        } else {
          // --- CONSTRUCCIÓN DE LA TABLA "SOFT-CLEAN" ---
          // ... dentro del bloque else donde result.data.length !== 0 ...

          let htmlAcumulado = `
          <div class="table-responsive">
            <table class="tabla-planilla">
              <thead>
                <tr class="header-labels">
                  <th class="text-start ps-4">NOMBRE COMPLETO / ID</th>
                  <th>E1</th>
                  <th>S1</th>
                  <th>E2</th>
                  <th>S2</th>
                </tr>
              </thead>
              <tbody>
        `;

          result.data.forEach((p) => {
            // Función para renderizar cada celda de tiempo con el estilo de badge
            const formatBadge = (obj) => {
              let claseStatus = "status-ok";
              const estado = (obj.estado || "").toUpperCase();

              if (estado === "FALTA" || obj.hora === "--:--") {
                claseStatus = "status-falta";
              } else if (estado === "TARDE") {
                claseStatus = "status-tarde";
              }

              return `
              <td class="celda-datos text-center">
                <span class="badge-planilla ${claseStatus}">
                  ${obj.hora || "--:--"}
                </span>
              </td>`;
            };

            htmlAcumulado += `
            <tr class="fila-planilla">
              <td class="celda-datos ps-4">
                <span class="nombre-txt">${p.info.nombre}</span>
                <span class="id-txt">ID: ${p.info.codigo}</span>
              </td>
              ${formatBadge(p.e1)}
              ${formatBadge(p.s1)}
              ${formatBadge(p.e2)}
              ${formatBadge(p.s2)}
            </tr>
          `;
          });

          htmlAcumulado += `</tbody></table></div>`;
          dom.contenedor.innerHTML = htmlAcumulado;
        }
      } catch (err) {
        console.error("Error en Matriz:", err);
        dom.contenedor.innerHTML = `<div class="alert alert-danger m-3 small">ERROR: ${err.message}</div>`;
      } finally {
        dom.loader.classList.add("d-none");
        dom.contenedor.classList.remove("d-none");
      }
    }

    setTimeout(() => {
      const dom = _getDom();
      if (dom.inputFecha) {
        const hoy = new Date().toLocaleDateString("en-CA", {
          timeZone: "America/Bogota",
        });
        dom.inputFecha.value = hoy;
      }
      cargarMatriz();
    }, 200);

    return { cargarMatriz };
  })();
</script>
