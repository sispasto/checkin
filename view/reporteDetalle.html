<style>
  /* --- Variables de Color Chrome --- */
  :root {
    --chrome-blue: #1a73e8; /* Azul característico de Chrome */
    --chrome-blue-dark: #174ea6;
    --bg-glass: rgba(255, 255, 255, 0.95);
    --border-light: #dadce0; /* Gris de bordes de Google */
  }

  /* --- Contenedor Principal --- */
  .card-reporte {
    background: var(--bg-glass) !important;
    border: 1px solid var(--border-light) !important;
    border-radius: 12px !important; /* Bordes ligeramente más rectos estilo Chrome */
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1) !important;
    overflow: hidden;
  }

  /* --- Encabezado Azul Chrome --- */
  .card-header {
    background: var(--chrome-blue) !important;
    padding: 15px 25px !important;
    border-bottom: none !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-title {
    color: #ffffff !important;
    font-family: "Google Sans", "Segoe UI", Roboto, sans-serif;
    font-weight: 500;
    font-size: 1.1rem;
    letter-spacing: 0.2px;
  }

  /* --- Filtro de Fecha --- */
  .input-fecha-chrome {
    background: rgba(0, 0, 0, 0.1) !important;
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
    color: #ffffff !important;
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 0.9rem;
  }

  /* --- Estructura de Tabla --- */
  .tabla-asistencia {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }

  .header-labels {
    background: var(--chrome-blue) !important;
    color: #ffffff;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }

  .header-labels th {
    padding: 10px 15px;
    border: none;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* --- Filas de Agentes --- */
  .fila-agente {
    border-bottom: 1px solid var(--border-light);
    transition: background 0.2s;
  }

  .fila-agente:hover {
    background: #f8f9fa;
  }

  .agente-info {
    padding: 12px 25px !important;
  }

  .nombre-txt {
    color: #202124; /* Negro Google */
    font-weight: 600;
    font-size: 0.9rem;
    display: block;
  }

  .id-txt {
    color: #5f6368;
    font-size: 0.75rem;
  }

  /* --- Cajas de Marcación --- */
  .caja-chrome {
    border-radius: 8px;
    padding: 8px;
    min-width: 80px;
    text-align: center;
    font-family: "Roboto Mono", monospace;
    font-size: 0.85rem;
    border: 1px solid #e8eaed;
    background: #ffffff;
  }

  .hora-vacia {
    color: #d93025; /* Rojo Google */
    border-color: #fad2cf;
    background: #fef7f6;
  }

  .hora-ok {
    color: #188038; /* Verde Google */
    border-color: #ceead6;
    background: #e6f4ea;
  }
</style>

<div class="container mt-3 mb-5">
  <div
    class="card card-reporte text-white shadow-lg"
    style="background: #0d1117"
  >
    <div
      class="card-header bg-gradient-dark py-3 border-secondary d-flex justify-content-between align-items-center"
    >
      <h6 class="mb-0 text-info fw-bold">
        <i class="bi bi-person-check-fill me-2"></i>CONTROL DE ASISTENCIA
      </h6>
    </div>

    <div class="card-body p-3">
      <div class="filtro-fecha">
        <div class="row g-2 align-items-end">
          <div class="col-10">
            <label class="text-secondary small d-block mb-1"
              >Seleccionar Fecha:</label
            >
            <input
              type="date"
              id="input-fecha"
              class="form-control input-dark w-100"
            />
          </div>
          <div class="col-2 text-end">
            <button
              onclick="nsReporteAsistencia.cargarMatriz()"
              class="btn btn-filter w-100"
            >
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="loader-reporte" class="text-center py-5 d-none">
        <div class="spinner-border text-info" role="status"></div>
        <p class="text-secondary small mt-2 font-monospace">SINCRONIZANDO...</p>
      </div>

      <div id="contenido-reporte" class="lista-asistencia"></div>
    </div>

    <div class="card-footer bg-black text-center py-3">
      <button
        onclick="window.location.hash = '#/'"
        class="btn btn-outline-secondary btn-sm w-100"
      >
        <i class="bi bi-arrow-left me-2"></i>VOLVER AL PANEL
      </button>
    </div>
  </div>
</div>

<script>
  window.nsReporteAsistencia = (function () {
    const _getDom = () => ({
      contenedor: document.getElementById("contenido-reporte"),
      loader: document.getElementById("loader-reporte"),
      inputFecha: document.getElementById("input-fecha"),
    });

    async function cargarMatriz() {
      const dom = _getDom();
      if (!dom.contenedor || !dom.loader) return;

      const fechaSeleccionada = dom.inputFecha.value;

      dom.loader.classList.remove("d-none");
      dom.contenedor.classList.add("d-none");
      dom.contenedor.innerHTML = "";

      try {
        const response = await fetch(
          `${window.SUPABASE_URL}/functions/v1/asist_get_reporte_detalle`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: window.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ fecha: fechaSeleccionada }),
          },
        );

        const result = await response.json();
        if (!response.ok)
          throw new Error(result.error || "Error de comunicación");

        if (!result.data || result.data.length === 0) {
          dom.contenedor.innerHTML = `
            <div class="text-center py-5 px-3">
              <i class="bi bi-search text-secondary fs-1 mb-3 d-block"></i>
              <h6 class="text-muted">SIN REGISTROS</h6>
              <p class="small text-muted">No hay marcas para el ${fechaSeleccionada}</p>
            </div>`;
        } else {
          // --- CONSTRUCCIÓN DE LA TABLA "SOFT-CLEAN" ---
          // ... dentro del else de cargarMatriz ...
          let htmlAcumulado = `
          <div class="table-responsive">
            <table class="tabla-asistencia">
              <thead>
                <tr class="header-labels text-center">
                  <th class="text-start ps-5">Nombre Completo</th>
                  <th>E1</th>
                  <th>S1</th>
                  <th>E2</th>
                  <th>S2</th>
                </tr>
              </thead>
              <tbody>
        `;

          result.data.forEach((p) => {
            const renderMarca = (obj) => {
              const esFalta =
                obj.hora === "--:--" ||
                (obj.estado || "").toUpperCase() === "FALTA";
              const claseStatus = esFalta ? "hora-vacia" : "hora-ok";
              return `
              <td class="text-center">
                <div class="caja-chrome ${claseStatus}">
                  ${obj.hora || "--:--"}
                </div>
              </td>`;
            };

            htmlAcumulado += `
              <tr class="fila-agente">
                <td class="agente-info">
                  <span class="nombre-txt">${p.info.nombre}</span>
                  <span class="id-txt">ID: ${p.info.codigo}</span>
                </td>
                ${renderMarca(p.e1)}
                ${renderMarca(p.s1)}
                ${renderMarca(p.e2)}
                ${renderMarca(p.s2)}
              </tr>
            `;
          });

          htmlAcumulado += `</tbody></table></div>`;
          dom.contenedor.innerHTML = htmlAcumulado;
        }
      } catch (err) {
        console.error("Error en Matriz:", err);
        dom.contenedor.innerHTML = `<div class="alert alert-danger m-3 small">ERROR: ${err.message}</div>`;
      } finally {
        dom.loader.classList.add("d-none");
        dom.contenedor.classList.remove("d-none");
      }
    }

    setTimeout(() => {
      const dom = _getDom();
      if (dom.inputFecha) {
        const hoy = new Date().toLocaleDateString("en-CA", {
          timeZone: "America/Bogota",
        });
        dom.inputFecha.value = hoy;
      }
      cargarMatriz();
    }, 200);

    return { cargarMatriz };
  })();
</script>
