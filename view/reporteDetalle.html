<style>
  /* --- Fondo y Contenedor Principal --- */
  .card-reporte {
    background: #ffffff !important;
    border: 1px solid #e1e4e8 !important;
    border-radius: 20px !important;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05) !important;
    overflow: hidden;
  }

  .card-header {
    background: #ffffff !important;
    padding: 20px !important;
    border-bottom: none !important;
  }

  .text-info-custom {
    color: #28a745 !important; /* Verde corporativo */
    font-weight: 800;
    font-size: 1.1rem;
  }

  /* --- Filtro de Fecha (Compacto y a la derecha) --- */
  .filtro-fecha {
    background-color: #f6f8fa;
    border-radius: 12px;
    padding: 10px 15px;
    border: 1px solid #e1e4e8;
  }

  .input-fecha-clean {
    border: none;
    background: transparent;
    font-weight: bold;
    color: #28a745;
  }

  /* --- Estructura de Tabla --- */
  .tabla-asistencia {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 10px;
  }

  .header-tabla {
    background-color: #eafaf1; /* Verde muy clarito */
    color: #28a745;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 1px;
  }

  .header-tabla th {
    padding: 12px;
    border: none;
  }

  /* --- Filas de Agentes --- */
  .fila-agente {
    background: #ffffff;
    transition: all 0.2s;
  }

  .fila-agente td {
    padding: 15px 10px;
    border-bottom: 1px solid #f1f3f5;
    vertical-align: middle;
  }

  .nombre-agente-container {
    display: flex;
    flex-direction: column;
  }

  .nombre-agente-text {
    font-weight: 700;
    color: #24292e;
    font-size: 0.9rem;
  }

  .id-agente-text {
    font-size: 0.7rem;
    color: #6a737d;
  }

  /* --- Bloques de Marcación (Cajas Blancas con borde) --- */
  .caja-marca {
    background: #ffffff;
    border: 1px solid #e1e4e8;
    border-radius: 10px;
    padding: 8px;
    min-width: 80px;
    text-align: center;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
  }

  /* --- Colores de Marcación --- */
  .hora-vacia {
    color: #d73a49;
  } /* Rojo para falta */
  .hora-ok {
    color: #28a745;
  } /* Verde para a tiempo */

  .card-footer {
    background: #ffffff !important;
    border-top: 1px solid #f1f3f5 !important;
  }
</style>

<div class="container mt-3 mb-5">
  <div
    class="card card-reporte text-white shadow-lg"
    style="background: #0d1117"
  >
    <div
      class="card-header bg-gradient-dark py-3 border-secondary d-flex justify-content-between align-items-center"
    >
      <h6 class="mb-0 text-info fw-bold">
        <i class="bi bi-person-check-fill me-2"></i>CONTROL DE ASISTENCIA
      </h6>
    </div>

    <div class="card-body p-3">
      <div class="filtro-fecha">
        <div class="row g-2 align-items-end">
          <div class="col-10">
            <label class="text-secondary small d-block mb-1"
              >Seleccionar Fecha:</label
            >
            <input
              type="date"
              id="input-fecha"
              class="form-control input-dark w-100"
            />
          </div>
          <div class="col-2 text-end">
            <button
              onclick="nsReporteAsistencia.cargarMatriz()"
              class="btn btn-filter w-100"
            >
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="loader-reporte" class="text-center py-5 d-none">
        <div class="spinner-border text-info" role="status"></div>
        <p class="text-secondary small mt-2 font-monospace">SINCRONIZANDO...</p>
      </div>

      <div id="contenido-reporte" class="lista-asistencia"></div>
    </div>

    <div class="card-footer bg-black text-center py-3">
      <button
        onclick="window.location.hash = '#/'"
        class="btn btn-outline-secondary btn-sm w-100"
      >
        <i class="bi bi-arrow-left me-2"></i>VOLVER AL PANEL
      </button>
    </div>
  </div>
</div>

<script>
  window.nsReporteAsistencia = (function () {
    const _getDom = () => ({
      contenedor: document.getElementById("contenido-reporte"),
      loader: document.getElementById("loader-reporte"),
      inputFecha: document.getElementById("input-fecha"),
    });

    async function cargarMatriz() {
      const dom = _getDom();
      if (!dom.contenedor || !dom.loader) return;

      const fechaSeleccionada = dom.inputFecha.value;

      dom.loader.classList.remove("d-none");
      dom.contenedor.classList.add("d-none");
      dom.contenedor.innerHTML = "";

      try {
        const response = await fetch(
          `${window.SUPABASE_URL}/functions/v1/asist_get_reporte_detalle`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: window.SUPABASE_ANON_KEY,
              Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ fecha: fechaSeleccionada }),
          },
        );

        const result = await response.json();
        if (!response.ok)
          throw new Error(result.error || "Error de comunicación");

        if (!result.data || result.data.length === 0) {
          dom.contenedor.innerHTML = `
            <div class="text-center py-5 px-3">
              <i class="bi bi-search text-secondary fs-1 mb-3 d-block"></i>
              <h6 class="text-muted">SIN REGISTROS</h6>
              <p class="small text-muted">No hay marcas para el ${fechaSeleccionada}</p>
            </div>`;
        } else {
          // --- CONSTRUCCIÓN DE LA TABLA "SOFT-CLEAN" ---
          let htmlAcumulado = `
            <div class="table-responsive">
              <table class="tabla-asistencia">
                <thead>
                  <tr class="header-tabla">
                    <th class="text-start ps-4">NOMBRE COMPLETO</th>
                    <th class="text-center">E1</th>
                    <th class="text-center">S1</th>
                    <th class="text-center">E2</th>
                    <th class="text-center pe-4">S2</th>
                  </tr>
                </thead>
                <tbody>
          `;

          result.data.forEach((p) => {
            // Función interna para crear las celdas de tiempo
            const formatCell = (data) => {
              let estadoClase = "hora-ok"; // Verde por defecto
              const estado = (data.estado || "").toUpperCase();

              if (estado === "FALTA" || data.hora === "--:--")
                estadoClase = "hora-vacia";
              else if (estado === "TARDE") estadoClase = "text-warn"; // Opcional por si quieres naranja

              return `
                <td class="text-center">
                  <div class="caja-marca ${estadoClase}">
                    ${data.hora || "--:--"}
                  </div>
                </td>`;
            };

            htmlAcumulado += `
              <tr class="fila-agente">
                <td class="ps-4">
                  <div class="nombre-agente-container">
                    <span class="nombre-agente-text">${p.info.nombre}</span>
                    <span class="id-agente-text">ID: ${p.info.codigo}</span>
                  </div>
                </td>
                ${formatCell(p.e1)}
                ${formatCell(p.s1)}
                ${formatCell(p.e2)}
                ${formatCell(p.s2)}
              </tr>
            `;
          });

          htmlAcumulado += `</tbody></table></div>`;
          dom.contenedor.innerHTML = htmlAcumulado;
        }
      } catch (err) {
        console.error("Error en Matriz:", err);
        dom.contenedor.innerHTML = `<div class="alert alert-danger m-3 small">ERROR: ${err.message}</div>`;
      } finally {
        dom.loader.classList.add("d-none");
        dom.contenedor.classList.remove("d-none");
      }
    }

    setTimeout(() => {
      const dom = _getDom();
      if (dom.inputFecha) {
        const hoy = new Date().toLocaleDateString("en-CA", {
          timeZone: "America/Bogota",
        });
        dom.inputFecha.value = hoy;
      }
      cargarMatriz();
    }, 200);

    return { cargarMatriz };
  })();
</script>
