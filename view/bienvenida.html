<style>
  /* Base inspirada en la interfaz Pro */
  :root {
    --pro-black: #1a1a1a;
    --pro-dark-gradient: linear-gradient(135deg, #212529 0%, #000000 100%);
    --pro-info: #17a2b8;
  }

  .container-login100 {
    min-height: 100vh;
    display: flex;
    justify-content: center; /* Centrado horizontal */
    align-items: center; /* Base centrada para que el flex funcione */
    background-color: #ffffff; /* Fondo blanco */
    padding: 15px;
  }

  .pro-card-welcome {
    background: #121418 !important;
    border-radius: 20px !important;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15) !important;
    max-width: 420px;
    width: 100%;

    /* EL TRUCO ESTÁ AQUÍ: */
    margin-bottom: 20vh; /* Esto la empuja hacia arriba un 20% de la altura de la pantalla */
  }
  .pro-header-welcome {
    background: var(--pro-dark-gradient);
    padding: 1.5rem !important;
    border-bottom: 3px solid var(--pro-info);
  }

  .welcome-img-container {
    padding: 20px;
    background: #fff;
  }

  .welcome-img-container img {
    width: 100%;
    height: auto;
    border-radius: 15px;
    transition: transform 0.5s ease;
  }

  .welcome-img-container img:hover {
    transform: scale(1.02);
  }

  .titulo-pro {
    font-family: "Poppins", sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
  }

  .subtitulo-pro {
    font-size: 0.75rem;
    color: var(--pro-info);
    letter-spacing: 1px;
    font-weight: 400;
    opacity: 0.8;
  }

  .footer-version {
    background: #f8f9fa;
    padding: 12px;
    border-top: 1px solid #eee;
  }

  .texto-version-pro {
    font-family: "Fira Code", monospace;
    font-size: 11px;
    color: #6c757d;
    font-weight: 500;
  }

  /* --- RESPONSIVE --- */
  /* Ajuste para que el Navbar no se vea tan pegado al Card en móviles */
  @media (max-width: 768px) {
    .pro-card-welcome {
      margin-bottom: 15vh; /* Un poco menos en móvil para que no choque con el navbar */
      margin-top: 60px; /* Espacio para el navbar fijo */
    }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .container-login100 {
      padding: 10px;
    }
    .pro-card-welcome {
      max-width: 500px;
      display: flex;
      flex-direction: row;
    }
    .pro-header-welcome {
      width: 40%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .welcome-img-container {
      width: 60%;
      padding: 10px;
    }
  }
</style>

<div class="container-login100">
  <div class="card pro-card-welcome">
    <div class="pro-header-welcome text-center">
      <div class="mb-2">
        <i class="bi bi-shield-lock-fill text-info fs-3"></i>
      </div>
      <h1 class="titulo-pro">Bienvenido</h1>
      <span class="subtitulo-pro">SISTEMA DE GESTIÓN ASIST</span>
    </div>

    <div class="welcome-img-container text-center">
      <picture>
        <source media="(min-width: 769px)" srcset="assets/bienvenida.webp" />
        <img
          id="imgBienvenida"
          src="assets/bienvenida_android.webp"
          alt="Bienvenida"
          fetchpriority="high"
          loading="eager"
        />
      </picture>
    </div>

    <div class="footer-version text-center">
      <span id="version-label" class="texto-version-pro">
        <i class="bi bi-cpu-fill me-1"></i> Asist 2026
      </span>
    </div>
  </div>
</div>
